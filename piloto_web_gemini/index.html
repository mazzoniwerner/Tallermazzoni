<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KineApp — Gestión de Kinesiología a Domicilio</title>
    <meta name="description" content="Webapp de gestión para empresa de kinesiología a domicilio. Agendamiento, fichas clínicas, calendario y consolidado financiero.">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/calendar.css">
    <link rel="stylesheet" href="css/responsive.css">

    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏥</text></svg>">
</head>
<body>
    <!-- App Root -->
    <div id="app">
        <!-- Loading State -->
        <div class="login-page">
            <div style="text-align: center;">
                <div class="spinner spinner-lg" style="margin: 0 auto var(--space-4);"></div>
                <p style="color: var(--text-muted);">Cargando KineApp...</p>
            </div>
        </div>
    </div>

    <!-- JavaScript Modules (order matters) -->
    <script src="js/utils.js"></script>
    <script src="js/store.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/sessions.js"></script>
    <script src="js/patients.js"></script>
    <script src="js/kinesiologists.js"></script>
    <script src="js/calendar.js"></script>
    <script src="js/finance.js"></script>
    <script src="js/kinesio-portal.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
