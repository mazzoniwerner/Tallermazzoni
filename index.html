<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Taller Mazzoni</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f4;
            color: #333;
        }
        .mensaje {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        /* Estilos del nuevo botón */
        .boton-juego {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 24px;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 16px;
            transition: background-color 0.3s;
        }
        .boton-juego:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div class="mensaje">
        <h1>Hola</h1>
        <p>Bienvenidos a Taller Mazzoni. Pronto verán trabajos en madera aquí.</p>
        <p>pico pal que lee</p>
        
        <a href="juego.html" class="boton-juego">Jugar esperando 🎮</a>
    </div>

</html>
